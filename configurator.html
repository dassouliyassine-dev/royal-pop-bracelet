<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Configurateur - Royal Pop Bracelet</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ffffff",
                        "background": "#131313",
                        "surface": "#1c1b1b",
                        "surface-variant": "#2a2a2a",
                        "outline-variant": "#444748",
                        "royal-blue": "#0055ff",
                        "royal-orange": "#ff6600"
                    },
                    "fontFamily": {
                        "display": ["Bodoni Moda", "serif"],
                        "body": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #131313; color: #e5e2e1; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .input-underline {
            border: none;
            border-bottom: 1px solid #444748;
            background: transparent;
            border-radius: 0;
            padding-bottom: 0.5rem;
        }
        .input-underline:focus {
            outline: none;
            border-bottom-color: #ffffff;
        }
    </style>
</head>
<body class="font-body antialiased flex flex-col h-screen overflow-hidden">
    <!-- Header -->
    <header class="bg-background/80 backdrop-blur-xl border-b border-outline-variant/30 h-20 flex-shrink-0">
        <div class="max-w-[1440px] mx-auto px-8 flex justify-between items-center h-full">
            <button class="text-primary"><span class="material-symbols-outlined">menu</span></button>
            <a class="font-display text-2xl tracking-tighter text-primary uppercase" href="index.html">ROYAL POP</a>
            <button class="text-primary"><span class="material-symbols-outlined">shopping_bag</span></button>
        </div>
    </header>

    <main class="flex-grow flex flex-col lg:flex-row overflow-hidden">
        <!-- Left Side: Canvas Area -->
        <section class="w-full lg:w-2/3 bg-[#0e0e0e] flex items-center justify-center relative p-12 overflow-hidden border-r border-outline-variant/20">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/40 z-0"></div>
            <div class="relative z-10 w-full max-w-2xl flex flex-col items-center">
                <img id="main-preview" alt="Watch Preview" class="w-full h-auto object-contain drop-shadow-[0_0_50px_rgba(0,85,255,0.15)] transition-all duration-1000" src="hero.png"/>
                <div class="absolute -left-12 top-1/2 -translate-y-1/2 hidden lg:flex flex-col gap-12">
                    <div class="flex flex-col items-center gap-2 group cursor-pointer">
                        <div class="w-2 h-2 rounded-full bg-royal-blue shadow-[0_0_10px_#0055ff]"></div>
                        <span class="text-[9px] uppercase tracking-widest text-primary [writing-mode:vertical-lr] rotate-180 font-bold">Modèle</span>
                    </div>
                    <div class="w-px h-16 bg-outline-variant/30 mx-auto"></div>
                    <div class="flex flex-col items-center gap-2 group cursor-pointer">
                        <div class="w-1.5 h-1.5 rounded-full bg-outline-variant"></div>
                        <span class="text-[9px] uppercase tracking-widest text-on-surface-variant [writing-mode:vertical-lr] rotate-180 font-bold">Strap</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Side: Controls Area -->
        <section class="w-full lg:w-1/3 bg-background flex flex-col p-12 overflow-y-auto scrollbar-hide">
            <div class="max-w-md mx-auto w-full">
                <div class="mb-16">
                    <span class="text-[10px] font-semibold tracking-[0.3em] uppercase text-royal-blue mb-4 block">Étape 1 / 3</span>
                    <h1 class="font-display text-4xl text-primary mb-2">Configurez votre Royal Pop</h1>
                    <p class="text-on-surface-variant font-light">Sélectionnez le boîtier de base pour votre création sur-mesure.</p>
                </div>

                <!-- Search -->
                <div class="relative mb-16 group">
                    <label class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant mb-4 block group-focus-within:text-primary transition-colors">Rechercher une édition</label>
                    <div class="relative">
                        <input type="text" class="input-underline w-full text-sm font-light text-primary" placeholder="Ex: Blue Edition, Orange..."/>
                        <span class="material-symbols-outlined absolute right-0 top-0 text-on-surface-variant">search</span>
                    </div>
                </div>

                <!-- Model Grid -->
                <div class="grid grid-cols-2 gap-6 mb-16">
                    <button class="flex flex-col items-center gap-4 p-8 border-2 border-royal-blue bg-surface-variant/30 group transition-all">
                        <div class="w-16 h-16 rounded-full overflow-hidden bg-black/40 p-2">
                            <img src="hero.png" class="w-full h-full object-contain"/>
                        </div>
                        <span class="text-[10px] font-bold tracking-widest uppercase text-primary text-center">BLUE EDITION</span>
                    </button>
                    <button class="flex flex-col items-center gap-4 p-8 border border-outline-variant/30 bg-transparent hover:border-royal-blue/50 group transition-all">
                        <div class="w-16 h-16 rounded-full overflow-hidden bg-black/20 p-2">
                            <img src="hero.png" class="w-full h-full object-contain grayscale"/>
                        </div>
                        <span class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant group-hover:text-primary text-center">ORANGE EDITION</span>
                    </button>
                </div>

                <!-- Bottom Action -->
                <div class="mt-auto pt-12 border-t border-outline-variant/20">
                    <div class="flex justify-between items-end mb-8">
                        <span class="text-[10px] font-semibold tracking-widest text-on-surface-variant uppercase">ESTIMATION</span>
                        <span class="font-display text-2xl text-primary">145,00 €</span>
                    </div>
                    <a href="checkout.html" class="w-full bg-primary text-on-primary py-5 px-8 text-[11px] font-bold uppercase tracking-[0.2em] flex justify-between items-center group hover:bg-royal-blue hover:text-white transition-all duration-500">
                        Continuer vers le strap
                        <span class="material-symbols-outlined group-hover:translate-x-2 transition-transform">arrow_forward</span>
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
